services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: crabtrap
      POSTGRES_USER: crabtrap
      POSTGRES_PASSWORD: secret
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crabtrap -d crabtrap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
