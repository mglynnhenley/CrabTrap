name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Create web embed placeholder
        run: make build-web-for-dev

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: crabtrap_test
          POSTGRES_USER: crabtrap
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crabtrap -d crabtrap_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://crabtrap:secret@localhost:5432/crabtrap_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate certificates
        run: make gen-certs

      - name: Build web placeholder for dev
        run: make build-web-for-dev

      - name: Run tests
        run: go test -race -p 1 ./...

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web UI
        run: make build-web

      - name: Copy web assets to embed location
        run: |
          rm -rf cmd/gateway/web
          mkdir -p cmd/gateway/web
          cp -r web/dist cmd/gateway/web/dist

      - name: Build gateway binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o linux/amd64/gateway cmd/gateway/*.go

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.goreleaser
          push: false
          tags: crabtrap:ci-test
          build-args: TARGETPLATFORM=linux/amd64
